                <td><span className="horizon-tag">{p.horizon}</span></td>
                <td><span className="status-tag" style={{ "--c": statusColor(p.status) }}><span className="dot" />{p.status}</span></td>
                <td className="num-cell">{p.roi.toFixed(1)}%</td>
                <td className="num-cell"><span className={`score-pill ${p.score >= 6 ? "hi" : "md"}`}>{p.score.toFixed(2)}</span></td>
              </tr>
            )}
          </tbody>
        </table>
      </div>);

  };

  // ===== Project List =====
  window.ProjectList = function ProjectList({ scenario, onSelect, narrative }) {
    const [search, setSearch] = useState("");
    const [playFilter, setPlayFilter] = useState(new Set());
    const [horizonFilter, setHorizonFilter] = useState(new Set());
    const [coreOnly, setCoreOnly] = useState(false);
    const [sortKey, setSortKey] = useState("score");
    const [sortDir, setSortDir] = useState("desc");

    const sc = SCENARIOS[scenario];
    const scale = sc.total / SCENARIOS.plan.total;

    const togglePlay = (id) => {
      const s = new Set(playFilter);
      s.has(id) ? s.delete(id) : s.add(id);
      setPlayFilter(s);
    };
    const toggleHorizon = (h) => {
      const s = new Set(horizonFilter);
      s.has(h) ? s.delete(h) : s.add(h);
      setHorizonFilter(s);
    };

    const handleSort = (k) => {
      if (sortKey === k) setSortDir(sortDir === "asc" ? "desc" : "asc");else
      {setSortKey(k);setSortDir("desc");}
    };

    const rows = useMemo(() => {
      let r = PROJECTS.slice();
      if (search.trim()) {
        const q = search.toLowerCase();
        r = r.filter((p) => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
      }
      if (playFilter.size) r = r.filter((p) => playFilter.has(p.play));
      if (horizonFilter.size) r = r.filter((p) => horizonFilter.has(p.horizon));
      if (coreOnly) r = r.filter((p) => p.core);
      r.sort((a, b) => {
        let av = a[sortKey],bv = b[sortKey];
        if (sortKey === "play") {av = PLAYS.find((x) => x.id === a.play).name;bv = PLAYS.find((x) => x.id === b.play).name;}
        if (typeof av === "string") return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
        return sortDir === "asc" ? av - bv : bv - av;
      });
      return r;
    }, [search, playFilter, horizonFilter, coreOnly, sortKey, sortDir]);

    const arrow = (k) => sortKey === k ? <span className="sort-arrow">{sortDir === "asc" ? "↑" : "↓"}</span> : null;

    return (
      <section id="projects" className="section" data-tone="paper-cool">
        <div className="section-head">
          <div>
            <div className="section-num">03 · PROJECT LIST</div>
            <h2 className="section-title">All 24 initiatives.</h2>
            {narrative &&
            <p className="section-sub">Click any row for the full project card with scoring formula and timeline.</p>
            }
          </div>
          <div className="section-side">
            showing <b>{rows.length}</b> of {PROJECTS.length}<br />
            total <b>€{Math.round(rows.reduce((s, p) => s + p.budget * scale, 0))}M</b>
          </div>
        </div>

        <div className="tbl-toolbar">
          <div className="tbl-search">
            <IconSearch />
            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search projects…" />
          </div>
          {PLAYS.map((p) =>
          <button key={p.id} className="tbl-chip"
          data-on={playFilter.has(p.id)}
          style={{ "--c": playColor(p.id) }}
          onClick={() => togglePlay(p.id)}>
              <span className="swatch" />
              {p.name.split(" ")[0]}
            </button>
          )}
          {["H1", "H2", "H3"].map((h) =>
          <button key={h} className="tbl-chip"
          data-on={horizonFilter.has(h)}
          style={{ "--c": "var(--fg-2)" }}
          onClick={() => toggleHorizon(h)}>{h}</button>
          )}
          <button className="tbl-chip" data-on={coreOnly} style={{ "--c": "var(--accent)" }}
          onClick={() => setCoreOnly(!coreOnly)}>CORE ONLY</button>
          <span className="tbl-chip-spacer" />
          <span className="tbl-count">{rows.length} ROWS · {sc.label.toUpperCase()}</span>
        </div>

        <table className="tbl">
          <thead>
            <tr>
              <th onClick={() => handleSort("id")}>#{arrow("id")}</th>
              <th onClick={() => handleSort("title")}>Project{arrow("title")}</th>
              <th onClick={() => handleSort("play")}>Play{arrow("play")}</th>
              <th onClick={() => handleSort("budget")} style={{ textAlign: "right" }}>€M{arrow("budget")}</th>
              <th onClick={() => handleSort("horizon")}>Horizon{arrow("horizon")}</th>
              <th onClick={() => handleSort("status")}>Status{arrow("status")}</th>
              <th>Core</th>
              <th onClick={() => handleSort("roi")} style={{ textAlign: "right" }}>ROI{arrow("roi")}</th>
              <th onClick={() => handleSort("score")} style={{ textAlign: "right" }}>Score{arrow("score")}</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((p) => {
              const play = PLAYS.find((x) => x.id === p.play);
              return (
                <tr key={p.id} onClick={() => onSelect(p.id)}>
                  <td className="id-cell">{String(p.id).padStart(2, "0")}</td>
                  <td style={{ maxWidth: 360 }}>{p.title}</td>
                  <td>
                    <span className="play-tag" style={{ "--c": playColor(p.play) }}>
                      <span className="dot" />{play.name.split(" ")[0]}
                    </span>
                  </td>
                  <td className="num-cell">€{Math.round(p.budget * scale)}</td>
                  <td><span className="horizon-tag">{p.horizon}</span></td>
                  <td>
                    <span className="status-tag" style={{ "--c": statusColor(p.status) }}>
                      <span className="dot" />{p.status}
                    </span>
                  </td>
                  <td><span className={`core-tag ${p.core ? "" : "no"}`}>{p.core ? "CORE" : "—"}</span></td>
                  <td className="num-cell">{p.roi.toFixed(1)}%</td>
                  <td className="num-cell">
                    <span className={`score-pill ${p.score >= 6 ? "hi" : "md"}`}>{p.score.toFixed(2)}</span>
                  </td>
                </tr>);

            })}
            {rows.length === 0 &&
            <tr><td colSpan="9" style={{ textAlign: "center", padding: 32, color: "var(--fg-3)" }}>No matches. Clear filters to reset.</td></tr>
            }
          </tbody>
        </table>
      </section>);

  };

  // ===== Project Modal =====
  window.ProjectModal = function ProjectModal({ projectId, scenario, onClose }) {
    if (!projectId) return null;
    const p = PROJECTS.find((x) => x.id === projectId);
    const play = PLAYS.find((x) => x.id === p.play);
    const sc = SCENARIOS[scenario];
    const scale = sc.total / SCENARIOS.plan.total;
    const years = Array.from({ length: 9 }, (_, i) => 2026 + i);
    const coreScore = p.core ? 5 : 2;

    return (
      <div className="modal-veil" onClick={onClose}>
        <div className="modal" style={{ "--c": playColor(p.play) }} onClick={(e) => e.stopPropagation()}>
          <div className="modal-head">
            <div>
              <div className="modal-eyebrow">#{String(p.id).padStart(2, "0")} · {play.num} {play.name}</div>
              <h3 className="modal-title">{p.title}</h3>
            </div>
            <button className="modal-close" onClick={onClose}><IconClose /></button>
          </div>
          <div className="modal-body">
            <p className="modal-desc">{p.desc}</p>

            <div className="modal-stats">
              <div className="modal-stat">
                <div className="modal-stat-key">Budget</div>
                <div className="modal-stat-val">€{Math.round(p.budget * scale)}M</div>
              </div>
              <div className="modal-stat">
                <div className="modal-stat-key">Projected ROI</div>
                <div className="modal-stat-val">{p.roi.toFixed(1)}%</div>
              </div>
              <div className="modal-stat">
                <div className="modal-stat-key">Project Score</div>
                <div className="modal-stat-val">{p.score.toFixed(2)}</div>
              </div>
              <div className="modal-stat">
                <div className="modal-stat-key">Status</div>
                <div className="modal-stat-val" style={{ fontSize: 14, color: statusColor(p.status) }}>{p.status}</div>
              </div>
            </div>

            <div className="modal-time">
              <div className="modal-time-label">Timeline · {p.start}–{p.end} · {p.dur} {p.dur === 1 ? "year" : "years"} · {p.horizon}</div>
              <div className="modal-time-bar">
                {years.map((y) =>
                <div key={y} className={`modal-time-cell ${y >= p.start && y <= p.end ? "active" : ""}`}>
                    {y}
                  </div>
                )}
              </div>
            </div>

            <div className="modal-formula">
              <div style={{ color: "var(--fg-3)", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase" }}>SCORING FORMULA</div>
              <div className="row"><span>Brand Image · {p.brand}</span><span><b>{p.brandS}</b></span></div>
              <div className="row"><span>Labour Reqs · {p.labor}</span><span><b>{p.laborS}</b></span></div>
              <div className="row"><span>Core Area · {p.core ? "Yes" : "No"}</span><span><b>{coreScore}</b></span></div>
              <div className="row"><span>IMPACT = (Brand + Labor + Core) / 3</span><span className="total"><b>{p.impact.toFixed(2)}</b></span></div>
              <div className="row" style={{ borderTop: "1px solid var(--line)", paddingTop: 8, marginTop: 4 }}>
                <span>URGENCY ← {p.horizon}</span><span><b>{p.urgency.toFixed(2)}</b></span>
              </div>
              <div className="row total" style={{ borderTop: "1px solid var(--line-2)", paddingTop: 8, marginTop: 4 }}>
                <span>SCORE = (Impact + Urgency) / 2</span><span>{p.score.toFixed(2)}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <span className="tag">{p.market}</span>
              <span className="tag">{p.horizon} · {p.start}–{p.end}</span>
              {p.core && <span className="tag" style={{ color: playColor(p.play), borderColor: playColor(p.play) }}>CORE</span>}
              {p.priority && <span className="tag">PRIORITY</span>}
            </div>
          </div>
        </div>
      </div>);

  };
})();  </script>

  <script type="text/babel">
// Scenario Stress + Timeline Gantt
(function () {
  const { useState, useEffect, useRef } = React;
  const { PLAYS, PROJECTS, SCENARIOS } = window.PORTFOLIO_DATA;

  // ===== Scenario Stress =====
  window.ScenarioSection = function ScenarioSection({ scenario, setScenario, customPct, setCustomPct, narrative }) {
    const useCustom = customPct !== null;
    const pct = useCustom ? customPct : SCENARIOS[scenario].pct;
    const revenue = 16800; // €M
    const total = Math.round((revenue * pct) / 100);
    const projectBudget = Math.round(total * 0.75);
    const innovHc = total - projectBudget;

    const planTotal = SCENARIOS.plan.total;
    const scale = total / planTotal;

    return (
      <section id="scenario" className="section" data-tone="paper-warm">
        <div className="section-head">
          <div>
            <div className="section-num">04 · SCENARIO STRESS</div>
            <h2 className="section-title">Stress Test Scenarios</h2>
            {narrative && (
              <p className="section-sub">Conservative reverts to multi-brand-retailer benchmarks. Plan defends the 4% boardroom number. Aggressive caps at 5% — only as a temporary catch-up bet.</p>
            )}
          </div>
          <div className="section-side">
            FY2025 REVENUE<br/>
            <b>€16.8B</b><br/>
            75% PROJECT · 25% HC
          </div>
        </div>

        <div className="scenario-wrap">
          <div className="scenario-control">
            <div className="scenario-segs">
              {Object.entries(SCENARIOS).map(([k, v]) => (
                <button key={k}
                  className="scenario-seg"
                  data-on={!useCustom && scenario === k}
                  onClick={() => { setScenario(k); setCustomPct(null); }}>
                  {v.label}
                </button>
              ))}
            </div>

            <div className="scenario-pct">
              <div className="scenario-pct-row">
                <span className="scenario-pct-key">% of FY2025 revenue</span>
                <span style={{ fontFamily: "Inter", fontSize: 10, color: "var(--fg-3)", letterSpacing: "0.1em" }}>
                  {useCustom ? "CUSTOM" : SCENARIOS[scenario].label.toUpperCase()}
                </span>
              </div>
              <div className="scenario-pct-val">{pct.toFixed(1)}<small>%</small></div>
              <div className="scenario-slider-block">
                <span className="scenario-slider-hint">Drag to stress-test</span>
                <input type="range" className="scenario-slider"
                  min="1.5" max="6.5" step="0.1" value={pct}
                  onChange={e => setCustomPct(parseFloat(e.target.value))} />
                <div className="scenario-ticks">
                  {[
                    { p: 1.5, label: "1.5%", named: false },
                    { p: 2.5, label: "CONSERVATIVE", named: true, key: "conservative" },
                    { p: 4.0, label: "PLAN", named: true, key: "plan" },
                    { p: 5.0, label: "AGGRESSIVE", named: true, key: "aggressive" },
                    { p: 6.5, label: "6.5%", named: false }
                  ].map((t) => {
                    const x = ((t.p - 1.5) / (6.5 - 1.5)) * 100;
                    const active = Math.abs(pct - t.p) < 0.05;
                    return (
                      <span key={t.label}
                        className={`tick ${t.named ? "named" : ""} ${active ? "active" : ""}`}
                        style={{ left: `${x}%` }}>
                        {t.label}
                      </span>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="scenario-note">
              {pct < 2.5 && <><b style={{color:"var(--fg)"}}>BELOW CONSERVATIVE.</b> Insufficient to fund regulatory must-dos (CBAM, DPP, EPR). Defensive only — innovation pipeline collapses.</>}
              {pct >= 2.5 && pct < 3.5 && <><b style={{color:"var(--fg)"}}>CONSERVATIVE TIER.</b> Reverts to multi-brand-retailer benchmark — appropriate after the 2030 transformation phase, not for the build phase.</>}
              {pct >= 3.5 && pct <= 4.5 && <><b style={{color:"var(--fg)"}}>PLAN TIER.</b> The defended budget. €670M = 4% of FY2025 revenue. Vertically-integrated brand spend tier (Nike/Adidas: 5–7%).</>}
              {pct > 4.5 && pct <= 5.5 && <><b style={{color:"var(--fg)"}}>AGGRESSIVE TIER.</b> Caps at 5% — defensible only as a temporary catch-up bet, not a steady state.</>}
              {pct > 5.5 && <><b style={{color:"var(--fg)"}}>ABOVE AGGRESSIVE.</b> Above peer benchmarks. Requires explicit board narrative — overheats run-rate and competes with retail capex.</>}
            </div>
          </div>

          <div className="scenario-output">
            <div>
              <div className="scenario-output-key">Total Budget</div>
              <div className="scenario-envelope">
                <span style={{ color: "var(--fg-3)" }}>€</span>
                <span className="cur">{total}</span>
                <span style={{ color: "var(--fg-3)" }}>M</span>
              </div>
            </div>

            <div className="scenario-envelope-bd">
              <div className="scenario-envelope-bd-cell">
                <div className="scenario-output-key">Project Budget · 75%</div>
                <div style={{ fontFamily: "Space Grotesk", fontWeight: 700, fontSize: 32, letterSpacing: "-0.025em", marginTop: 4 }}>
                  €{projectBudget}M
                </div>
              </div>
              <div className="scenario-envelope-bd-cell">
                <div className="scenario-output-key">Innovation HC · 25%</div>
                <div style={{ fontFamily: "Space Grotesk", fontWeight: 700, fontSize: 32, letterSpacing: "-0.025em", marginTop: 4 }}>
                  €{innovHc}M
                </div>
              </div>
            </div>

            <div>
              <div className="scenario-output-key" style={{ marginBottom: 14 }}>Per-Play Allocation</div>
              <div className="scenario-stack">
                {PLAYS.map(p => {
                  const sb = Math.round(p.budget * scale);
                  return (
                    <div key={p.id} className="scenario-stack-row" style={{ "--c": playColor(p.id) }}>
                      <div className="scenario-stack-name">
                        <span className="dot" />
                        {p.name}
                      </div>
                      <div className="scenario-stack-bar">
                        <div className="scenario-stack-fill" style={{ width: `${p.pct}%` }} />
                      </div>
                      <div className="scenario-stack-val">€{sb}M</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </section>
    );
  };

  // ===== Timeline =====
  window.TimelineSection = function TimelineSection({ scenario, currentYear, setCurrentYear, onSelect, narrative }) {
    const [playing, setPlaying] = useState(false);
    const sc = SCENARIOS[scenario];
    const scale = sc.total / SCENARIOS.plan.total;
    const years = Array.from({ length: 9 }, (_, i) => 2026 + i);

    useEffect(() => {
      if (!playing) return;
      const t = setInterval(() => {
        setCurrentYear(y => {
          if (y >= 2034) { setPlaying(false); return 2034; }
          return y + 1;
        });
      }, 800);
      return () => clearInterval(t);
    }, [playing, setCurrentYear]);

    // Sort: by start, then play, then budget desc
    const rows = [...PROJECTS].sort((a,b) => a.start - b.start || a.play.localeCompare(b.play) || b.budget - a.budget);

    const activeCount = PROJECTS.filter(p => p.start <= currentYear && p.end >= currentYear).length;
    const activeBudget = PROJECTS.filter(p => p.start <= currentYear && p.end >= currentYear)
      .reduce((s,p) => s + p.budget * scale, 0);

    return (
      <section id="timeline" className="section" data-tone="paper-cool">
        <div className="section-head">
          <div>
            <div className="section-num">05 · TIMELINE</div>
            <h2 className="section-title">2026 → 2034.</h2>
            {narrative && (
              <p className="section-sub">Press play to scrub the 8-year arc.</p>
            )}
          </div>
          <div className="section-side">
            <b>{currentYear}</b> · {activeCount} active<br/>
            <b>€{Math.round(activeBudget)}M</b> in flight
          </div>
        </div>

        <div className="timeline-wrap">
          <div className="timeline-tools">
            <button className="timeline-play-btn" data-playing={playing}
              onClick={() => {
                if (currentYear >= 2034) setCurrentYear(2026);
                setPlaying(!playing);
              }}>
              {playing ? <IconPause /> : <IconPlay />}
              {playing ? "PAUSE" : "PLAY"}
            </button>
            <div className="timeline-year-display">{currentYear}</div>
            <div className="timeline-year-slider">
              <input type="range" min="2026" max="2034" step="1" value={currentYear}
                onChange={e => { setCurrentYear(parseInt(e.target.value)); setPlaying(false); }} />
            </div>
            <span className="timeline-tools-meta">{activeCount} OF 24 ACTIVE · {Math.round(activeBudget)}M IN FLIGHT</span>
          </div>

          <div className="gantt">
            <div className="gantt-head">
              <div>PROJECT</div>
              <div style={{ textAlign:"right" }}>€M</div>
              {years.map(y => (
                <div key={y} className={`yr ${y === currentYear ? "cur" : ""}`}>{y}</div>
              ))}
            </div>
            {rows.map(p => (
              <div key={p.id} className="gantt-row">
                <div className="lbl" onClick={() => onSelect(p.id)}>
                  <span className="id">{String(p.id).padStart(2,"0")}</span>
                  <span className="nm">{p.title}</span>
                </div>
                <div className="bd">€{Math.round(p.budget * scale)}M</div>
                {years.map(y => {
                  const active = y >= p.start && y <= p.end;
                  const isStart = y === p.start;
                  const isEnd = y === p.end;
                  const past = active && y < currentYear;
                  const future = y > currentYear;
                  const cur = y === currentYear;
                  return (
                    <div key={y} className={`yr ${cur ? "cur" : ""}`}>
                      {active && (
                        <div className={`yr-bar ${isStart ? "start" : ""} ${isEnd ? "end" : ""} ${past ? "dim" : ""} ${future ? "future" : ""}`}
                          style={{ background: playColor(p.play) }} />
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  };
})();
  </script>

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = {
  "scenario": "conservative",
  "theme": "stadium",
  "density": "comfortable",
  "narrative": true
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeSection, setActiveSection] = useState("cover");
  const [activePlay, setActivePlay] = useState(null);
  const [modalProject, setModalProject] = useState(null);
  const [customPct, setCustomPct] = useState(null);
  const [currentYear, setCurrentYear] = useState(2026);

  useEffect(() => {
    document.body.dataset.theme = tweaks.theme;
    document.body.dataset.density = tweaks.density;
  }, [tweaks.theme, tweaks.density]);

  const setScenario = (s) => { setTweak("scenario", s); setCustomPct(null); };

  const navigate = useCallback((id) => {
    setActiveSection(id);
    const el = document.getElementById(id);
    if (el) {
      window.scrollTo({ top: el.offsetTop - 60, behavior: "smooth" });
    }
  }, []);

  useEffect(() => {
    const ids = ["cover", "executive", "plays", "projects", "scenario", "timeline"];
    const onScroll = () => {
      const y = window.scrollY + 120;
      let cur = "cover";
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActiveSection(cur);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") setModalProject(null); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const handleNavPlay = (playId) => {
    setActivePlay(playId);
    navigate("plays");
  };

  return (
    <div className="app">
      <Sidebar
        active={activeSection}
        scenario={tweaks.scenario}
        setScenario={setScenario}
        onNav={navigate} />

      <main className="main">
        <Topbar scenario={tweaks.scenario} activeSection={activeSection} onNav={navigate} />

        <Cover onNav={navigate} narrative={tweaks.narrative} />

        <ExecutiveView
          scenario={tweaks.scenario}
          onSelect={setModalProject}
          onNavPlay={handleNavPlay}
          narrative={tweaks.narrative} />

        <PlaysSection
          scenario={tweaks.scenario}
          active={activePlay}
          setActive={setActivePlay}
          onSelect={setModalProject}
          narrative={tweaks.narrative} />

        <ProjectList
          scenario={tweaks.scenario}
          onSelect={setModalProject}
          narrative={tweaks.narrative} />

        <ScenarioSection
          scenario={tweaks.scenario}
          setScenario={setScenario}
          customPct={customPct}
          setCustomPct={setCustomPct}
          narrative={tweaks.narrative} />

        <TimelineSection
          scenario={tweaks.scenario}
          currentYear={currentYear}
          setCurrentYear={setCurrentYear}
          onSelect={setModalProject}
          narrative={tweaks.narrative} />

        <footer className="footer">
          <div style={{ fontFamily: "Inter" }}>
            <b>SOURCE</b> · Decathlon FY2024/FY2025 disclosures · BCG Innovation Edge 2024 · IE Workshop II brief · Foundernest 2026 benchmarks · EU Commission DPP regulation 2025-26.
          </div>
          <div className="footer-credit" style={{ fontFamily: "Inter" }}>
            <b style={{ fontFamily: "Inter" }}>EMBA · A1-B · IE BUSINESS SCHOOL · APRIL 2026</b><br />
            FAIYSAL · KIMIE · PAULINE · SALEM · ISABEL · SULTAN
          </div>
        </footer>
      </main>

      {modalProject &&
        <ProjectModal
          projectId={modalProject}
          scenario={tweaks.scenario}
          onClose={() => setModalProject(null)} />
      }

      <TweaksPanel title="Tweaks">
        <TweakSection label="Scenario">
          <TweakRadio value={tweaks.scenario} onChange={(v) => setTweak("scenario", v)}
            options={[
              { value: "conservative", label: "Conservative" },
              { value: "plan", label: "Plan" },
              { value: "aggressive", label: "Aggressive" }
            ]} />
        </TweakSection>
        <TweakSection label="Theme">
          <TweakRadio value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
            options={[
              { value: "stadium", label: "Stadium" },
              { value: "court", label: "Court" },
              { value: "paper", label: "Paper" }
            ]} />
        </TweakSection>
        <TweakSection label="Density">
          <TweakRadio value={tweaks.density} onChange={(v) => setTweak("density", v)}
            options={[
              { value: "compact", label: "Compact" },
              { value: "comfortable", label: "Comfort" },
              { value: "loose", label: "Loose" }
            ]} />
        </TweakSection>
        <TweakSection label="Narrative">
          <TweakToggle value={tweaks.narrative} onChange={(v) => setTweak("narrative", v)}
            label={tweaks.narrative ? "Showing narrative" : "Data only"} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
